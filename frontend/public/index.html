<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />

        <!-- Primary SEO -->

            name="description"
            content="weROI is a Jamaican digital growth agency. We build websites, SEO, custom software, marketing funnels, CRM, automation, and ad systems so local businesses get found on Google and scale with measurable ROI."
        />
        <meta name="keywords" content="digital growth agency Jamaica, web design Kingston, SEO Jamaica, custom software, marketing automation, lead generation, business growth" />

        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

        <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.weroi.net/" />
        <meta property="og:title" content="weROI | Digital Growth Agency in Jamaica" />
        <meta property="og:description" content="Jamaican digital growth agency building websites, SEO, custom software, and marketing systems that help local businesses get found online and scale with measurable ROI." />
        <meta property="og:image" content="https://www.weroi.net/og-image.png" />

        <meta name="twitter:creator" content="@weroi.co" />
        <meta name="twitter:url" content="https://www.weroi.net/" />
        <meta name="twitter:title" content="weROI | Digital Growth Agency in Jamaica" />
        <meta name="twitter:description" content="Jamaican digital growth agency building websites, SEO, custom software, and marketing systems for measurable ROI." />

        <meta name="twitter:image:alt" content="weROI — Digital growth agency in Jamaica" />

          "@graph": [
            {
              "@type": "WebSite",
              "@id": "https://www.weroi.net/#website",
              "url": "https://www.weroi.net/",
              "name": "weROI",
              "description": "Digital growth agency in Jamaica — websites, SEO, custom software, and marketing systems.",
              "publisher": { "@id": "https://www.weroi.net/#organization" }
            },
            {
              "@type": ["Organization", "LocalBusiness"],
              "@id": "https://www.weroi.net/#organization",
              "name": "weROI",
              "url": "https://www.weroi.net",
              "logo": "https://www.weroi.net/logo192.png",
              "image": "https://www.weroi.net/og-image.png",
              "description": "Jamaican digital growth agency specializing in websites, SEO, custom software, marketing funnels, CRM, automation, and ad systems for small businesses and scaling brands.",

              "areaServed": {
                "@type": "Country",
                "name": "Jamaica"
              },
              "address": {
                "@type": "PostalAddress",
                "addressCountry": "JM"
              },
              "sameAs": [
