<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />

        <!-- Primary SEO -->
        <title>weROI</title>
        <meta
            name="description"
            content="weROI builds websites, custom software, marketing funnels, CRM, automation, SEO and ad systems for small businesses and scaling brands."
        />
        <meta name="keywords" content="ROI, brand scaling, digital systems, business growth, local businesses, lead generation, conversion optimization" />
        <meta name="author" content="weROI" />

        <!-- Mobile & Theme -->
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#141414" />

        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

        <!-- Open Graph / Facebook / WhatsApp / LinkedIn / Instagram -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://weroi.net/" />
        <meta property="og:title" content="weROI" />
        <meta property="og:description" content="weROI builds websites, custom software, marketing funnels, CRM, automation, SEO and ad systems for small businesses and scaling brands." />
        <meta property="og:image" content="https://weroi.net/og-image.png" />
        <meta property="og:image:secure_url" content="https://weroi.net/og-image.png" />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt" content="weROI - Brand Scaling Systems" />
        <meta property="og:site_name" content="weROI" />
        <meta property="og:locale" content="en_US" />
        
        <!-- Instagram-specific (uses Open Graph) -->
        <meta property="og:see_also" content="https://weroi.net/" />
        <meta property="article:publisher" content="https://weroi.net/" />

        <!-- Twitter Card / X -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@weroi.co" />
        <meta name="twitter:creator" content="@weroi.co" />
        <meta name="twitter:url" content="https://weroi.net/" />
        <meta name="twitter:title" content="weROI" />
        <meta name="twitter:description" content="weROI builds websites, custom software, marketing funnels, CRM, automation, SEO and ad systems for small businesses and scaling brands." />
        <meta name="twitter:image" content="https://weroi.net/og-image.png" />
        <meta name="twitter:image:src" content="https://weroi.net/og-image.png" />
        <meta name="twitter:image:alt" content="weROI - Brand Scaling Systems" />

        <!-- iMessage / Apple Messages -->
        <meta property="al:ios:url" content="https://weroi.net/" />
        <meta property="al:ios:app_name" content="weROI" />
        <meta property="al:android:url" content="https://weroi.net/" />
        <meta property="al:android:app_name" content="weROI" />
        <meta property="al:web:url" content="https://weroi.net/" />
        
        <!-- Additional SEO -->
        <link rel="canonical" href="https://weroi.net/" />
        <meta name="robots" content="index, follow, max-image-preview:large" />
        
        <!-- Preconnect for performance -->
        <link rel="preconnect" href="https://weroi.net" />
        <link rel="dns-prefetch" href="https://weroi.net" />
        
        <!-- Image preload for social sharing -->
        <link rel="preload" as="image" href="%PUBLIC_URL%/og-image.png" />
    </head>

    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
